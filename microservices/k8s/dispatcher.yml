apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatcher-service
  template:
    metadata:
      labels:
        app: dispatcher-service
    spec:
      containers:
      - name: dispatcher-service
        image: vixp/dispatcher-service:1.0.0
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        env:
          - name: RABBITMQ_URL
            value: amqp://guest:guest@rabbitmq:5672/
          - name: AUTH_URL
            value: http://auth-service:80
          - name: LOGGER_URL
            value: http://logger-service:80
        ports:
          - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: dispatcher-service
spec:
  selector:
    app: dispatcher-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: main-port
